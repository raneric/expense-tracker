name: 'Deploy to Firebase Hosting'
description: 'Builds and deploys the app to Firebase Hosting using the Firebase CLI'
inputs:
  firebase_service_account:
    description: 'Firebase service account JSON'
    required: true
  project_id:
    description: 'Firebase project ID'
    required: true
  channel_id:
    description: 'Deploy channel (e.g., live)'
    required: false
    default: 'live'
  build_dir:
    description: 'Directory containing the built app'
    required: false
    default: 'dist'
  node_version:
    description: 'Node.js version'
    required: false
    default: '24'

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node_version }}

    - name: Install Firebase CLI
      shell: bash
      run: npm install -g firebase-tools

    - name: Deploy to Firebase Hosting
      shell: bash
      run: |
        echo "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
        firebase deploy \
          --only hosting \
          --project "${{ inputs.project_id }}" \
          --non-interactive
      env:
        FIREBASE_SERVICE_ACCOUNT: ${{ inputs.firebase_service_account }}
        GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-key.json
        FIREBASE_CLI_EXPERIMENTS: webframeworks