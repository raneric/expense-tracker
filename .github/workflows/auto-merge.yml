name: auto-merge dependency PR
run-name: Run automatic merge if PR are from auto-deps-check

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: |
      contains(github.event.pull_request.title, 'Auto dependency fix')
    runs-on: ubuntu-latest
    steps:
      - name: Check mergeable state
        id: mergeable
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pull_request_number = context.payload.pull_request.number;
            const getPullRequest = async () =>
                github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pull_request_number,
                });

            const { data: pr } = await getPullRequest();
            const pull_request_data = pr.mergeable === null ? (await getPullRequest()).data : pr;

            core.setOutput('mergeable', String(pull_request_data.mergeable));
            core.setOutput('mergeable_state', pull_request_data.mergeable_state);

      - name: Auto merge Pull Request
        if: steps.mergeable.outputs.mergeable == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pull_request_number = context.payload.pull_request.number;
            const merge_response = await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pull_request_number,
                commit_title: 'chore: auto fix vulnerabilities',
                commit_message: 'Automated npm audit fix and dependency update',
                merge_method: 'squash',
              });
            core.info(`Merge status: ${merge_response.data.merged ? 'merged' : 'not merged'}`);
            core.setOutput('merged', String(merge_response.data.merged));
